name: Generate Profile SVGs

on:
  schedule:
    - cron: '0 */12 * * *'
  push:
    paths:
      - 'config.yml'
      - 'generator/**'
  workflow_dispatch:

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  queue: max

permissions:
  contents: write

jobs:
  generate:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout repo
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Generate SVGs
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: python -m generator.main

      - name: Commit and push SVGs
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add assets/generated/*.svg
          if git diff --cached --quiet; then
            echo "No changes to commit"
          else
            git commit -m "chore: update datastack SVGs [skip ci]"
            for i in 1 2 3; do
              git fetch origin main
              git rebase origin/main || { git rebase --abort; continue; }
              git push origin main && break
              echo "Push failed, retrying ($i/3)..."
              sleep 5
            done
          fi
