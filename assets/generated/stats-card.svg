<svg xmlns="http://www.w3.org/2000/svg" width="850" height="180" viewBox="0 0 850 180">
  <defs>
    <style>
      .metric-icon {
        animation: count-glow 4s ease-in-out infinite;
      }
      @keyframes count-glow {
        0%, 100% { fill-opacity: 0.7; }
        50% { fill-opacity: 1; }
      }
    </style>
    <filter id="num-glow" x="-30%" y="-30%" width="160%" height="160%">
      <feGaussianBlur stdDeviation="3"/>
    </filter>
  </defs>

  <!-- Card background -->
  <rect x="0.5" y="0.5" width="849" height="179" rx="12" ry="12"
        fill="#0b1120" stroke="#1e3a5f" stroke-width="1"/>

  <!-- Section title -->
  <text x="30" y="38" fill="#4a6582" font-size="11" font-family="monospace" letter-spacing="3">DATA TELEMETRY</text>

  <!-- Dividers -->
    <line x1="170.0" y1="55" x2="170.0" y2="155" stroke="#1e3a5f" stroke-width="1" opacity="0.5"/>
    <line x1="340.0" y1="55" x2="340.0" y2="155" stroke="#1e3a5f" stroke-width="1" opacity="0.5"/>
    <line x1="510.0" y1="55" x2="510.0" y2="155" stroke="#1e3a5f" stroke-width="1" opacity="0.5"/>
    <line x1="680.0" y1="55" x2="680.0" y2="155" stroke="#1e3a5f" stroke-width="1" opacity="0.5"/>

  <!-- Metric cells -->
    <g class="metric-cell" transform="translate(85.0, 95)">
      <g transform="translate(-8, -30) scale(1)">
        <svg viewBox="0 0 16 16" width="16" height="16" color="#00c8a0" class="metric-icon" style="animation-delay: 0.0s">
          <path d="M1.5 8a6.5 6.5 0 1 1 13 0 6.5 6.5 0 0 1-13 0z" fill="none" stroke="currentColor" stroke-width="1.2"/><path d="M8 5v6M5 8h6" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </g>
      <text x="0" y="2" text-anchor="middle" fill="#00c8a0" font-size="28" font-weight="bold" font-family="sans-serif" opacity="0.35" filter="url(#num-glow)">0</text>
      <text x="0" y="2" text-anchor="middle" fill="#e6f1ff" font-size="28" font-weight="bold" font-family="sans-serif">0</text>
      <text x="0" y="20" text-anchor="middle" fill="#4a6582" font-size="11" font-family="monospace" letter-spacing="1">Commits</text>
    </g>
    <g class="metric-cell" transform="translate(255.0, 95)">
      <g transform="translate(-8, -30) scale(1)">
        <svg viewBox="0 0 16 16" width="16" height="16" color="#ff6b35" class="metric-icon" style="animation-delay: 0.3s">
          <path d="M8 1.5l1.8 4.1 4.4.4-3.3 2.9 1 4.3L8 11l-3.7 2.2 1-4.3-3.3-2.9 4.4-.4z" fill="none" stroke="currentColor" stroke-width="1.2" stroke-linejoin="round"/>
        </svg>
      </g>
      <text x="0" y="2" text-anchor="middle" fill="#ff6b35" font-size="28" font-weight="bold" font-family="sans-serif" opacity="0.35" filter="url(#num-glow)">1</text>
      <text x="0" y="2" text-anchor="middle" fill="#e6f1ff" font-size="28" font-weight="bold" font-family="sans-serif">1</text>
      <text x="0" y="20" text-anchor="middle" fill="#4a6582" font-size="11" font-family="monospace" letter-spacing="1">Stars</text>
    </g>
    <g class="metric-cell" transform="translate(425.0, 95)">
      <g transform="translate(-8, -30) scale(1)">
        <svg viewBox="0 0 16 16" width="16" height="16" color="#2ecc71" class="metric-icon" style="animation-delay: 0.6s">
          <path d="M5 2v12M5 4a3 3 0 1 0 0 6 3 3 0 0 0 0-6z" fill="none" stroke="currentColor" stroke-width="1.2"/><path d="M11 8a3 3 0 1 0 0 6 3 3 0 0 0 0-6z" fill="none" stroke="currentColor" stroke-width="1.2"/><path d="M8 5h3M8 11h3" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </g>
      <text x="0" y="2" text-anchor="middle" fill="#2ecc71" font-size="28" font-weight="bold" font-family="sans-serif" opacity="0.35" filter="url(#num-glow)">6</text>
      <text x="0" y="2" text-anchor="middle" fill="#e6f1ff" font-size="28" font-weight="bold" font-family="sans-serif">6</text>
      <text x="0" y="20" text-anchor="middle" fill="#4a6582" font-size="11" font-family="monospace" letter-spacing="1">PRs</text>
    </g>
    <g class="metric-cell" transform="translate(595.0, 95)">
      <g transform="translate(-8, -30) scale(1)">
        <svg viewBox="0 0 16 16" width="16" height="16" color="#00c8a0" class="metric-icon" style="animation-delay: 0.8999999999999999s">
          <circle cx="8" cy="8" r="6.5" fill="none" stroke="currentColor" stroke-width="1.2"/><circle cx="8" cy="8" r="2" fill="currentColor"/>
        </svg>
      </g>
      <text x="0" y="2" text-anchor="middle" fill="#00c8a0" font-size="28" font-weight="bold" font-family="sans-serif" opacity="0.35" filter="url(#num-glow)">0</text>
      <text x="0" y="2" text-anchor="middle" fill="#e6f1ff" font-size="28" font-weight="bold" font-family="sans-serif">0</text>
      <text x="0" y="20" text-anchor="middle" fill="#4a6582" font-size="11" font-family="monospace" letter-spacing="1">Issues</text>
    </g>
    <g class="metric-cell" transform="translate(765.0, 95)">
      <g transform="translate(-8, -30) scale(1)">
        <svg viewBox="0 0 16 16" width="16" height="16" color="#2ecc71" class="metric-icon" style="animation-delay: 1.2s">
          <path d="M4 2h8a2 2 0 0 1 2 2v10a2 2 0 0 1-2 2H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2z" fill="none" stroke="currentColor" stroke-width="1.2"/><path d="M4 7h8M4 11h5" stroke="currentColor" stroke-width="1.2" stroke-linecap="round"/>
        </svg>
      </g>
      <text x="0" y="2" text-anchor="middle" fill="#2ecc71" font-size="28" font-weight="bold" font-family="sans-serif" opacity="0.35" filter="url(#num-glow)">15</text>
      <text x="0" y="2" text-anchor="middle" fill="#e6f1ff" font-size="28" font-weight="bold" font-family="sans-serif">15</text>
      <text x="0" y="20" text-anchor="middle" fill="#4a6582" font-size="11" font-family="monospace" letter-spacing="1">Repos</text>
    </g>
</svg>